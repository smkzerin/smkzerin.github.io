<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holud night — Zerin &amp; Shoumik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col" data-category="holud">

<header class="px-6 md:px-10 py-6 flex items-center justify-between">
  <a href="index.html" class="text-xs tracking-[0.2em] uppercase" style="color:var(--maroon)">Zerin &amp; Shoumik</a>
  <nav class="hidden md:flex gap-8 text-xs tracking-[0.1em] uppercase">
    <a href="holud.html" class="font-medium" style="color:var(--marigold-deep)">Holud</a>
    <a href="wedding.html" class="hover:opacity-70">Wedding</a>
    <a href="reception.html" class="hover:opacity-70">Reception</a>
    <a href="downloads.html" class="hover:opacity-70">Downloads</a>
  </nav>
  <button id="menu-btn" class="md:hidden text-2xl leading-none" aria-label="Open menu">&#9776;</button>
</header>
<div id="mobile-nav" class="hidden md:hidden px-6 pb-4 flex flex-col gap-3 text-xs uppercase tracking-[0.1em]">
  <a href="holud.html">Holud</a>
  <a href="wedding.html">Wedding</a>
  <a href="reception.html">Reception</a>
  <a href="downloads.html">Downloads</a>
</div>

<main class="flex-1 px-6 md:px-10 pb-16">
  <section class="pt-4 pb-8 text-center max-w-2xl mx-auto">
    <p class="text-xs tracking-[0.25em] uppercase mb-3" style="color:var(--marigold-deep)">Night one</p>
    <h1 class="font-display text-4xl md:text-5xl" style="color:var(--maroon)">Holud</h1>
    <p class="mt-3 text-sm font-light" style="color:rgba(43,38,32,0.75)">Turmeric, marigolds, and dancing before the big day.</p>
  </section>

  <span class="garland mx-auto block max-w-sm mb-10"></span>

  <section data-collage-section class="max-w-5xl mx-auto mb-12">
    <div id="hero-collage" class="collage">
      <img data-slot src="" alt="" class="collage-1">
      <img data-slot src="" alt="" class="collage-2">
      <img data-slot src="" alt="" class="collage-3">
      <img data-slot src="" alt="" class="collage-4">
    </div>
    <div class="flex justify-end gap-2 mt-3">
      <button id="hero-prev" class="collage-arrow border" style="border-color:var(--marigold-deep); color:var(--marigold-deep)" aria-label="Previous photos">&#8249;</button>
      <button id="hero-next" class="collage-arrow" style="background:var(--marigold-deep); color:var(--cream)" aria-label="Next photos">&#8250;</button>
    </div>
  </section>

  <section class="max-w-5xl mx-auto mb-12">
    <h2 class="font-display text-2xl mb-4" style="color:var(--charcoal)">Videos</h2>
    <div id="video-row" class="flex gap-4 overflow-x-auto pb-2"></div>
  </section>

  <section class="max-w-5xl mx-auto">
    <div class="flex items-baseline justify-between mb-4">
      <h2 class="font-display text-2xl" style="color:var(--charcoal)">Photos</h2>
      <span id="photo-count" class="text-xs" style="color:rgba(43,38,32,0.5)"></span>
    </div>

    <!-- Person filter tabs — auto-shown only for Holud where photos are split by person -->
    <div id="person-filter" class="hidden flex gap-2 mb-5 flex-wrap"></div>

    <div id="photo-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 md:gap-4"></div>
    <div class="flex justify-center mt-8">
      <button id="load-more" class="px-6 py-3 rounded-full text-sm border" style="border-color:rgba(43,38,32,0.2)">Load more</button>
    </div>
  </section>
</main>

<footer class="px-6 md:px-10 py-8 text-center text-xs" style="color:rgba(43,38,32,0.5)">
  <p>Made with love for Zerin &amp; Shoumik &middot; <span id="year"></span></p>
</footer>

<!-- Lightbox -->
<div id="lightbox" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(20,17,13,0.92)">
  <button id="lightbox-close" class="absolute top-5 right-5 text-white text-3xl leading-none z-20" aria-label="Close">&times;</button>
  <a id="lightbox-download" href="#" download class="absolute top-5 left-1/2 -translate-x-1/2 text-white text-sm leading-none hover:opacity-80 z-10" style="background:rgba(43,38,32,0.75);padding:7px 12px;border-radius:6px;backdrop-filter:blur(4px)" title="Download photo">Download &#x2193;</a>
  <button id="lightbox-prev" class="absolute left-0 md:left-0 top-0 bottom-0 w-16 md:w-24 flex items-center justify-center text-white text-4xl z-10" aria-label="Previous photo"><span class="w-12 h-12 flex items-center justify-center rounded-full" style="background:rgba(20,17,13,0.5)">&#8249;</span></button>
  <button id="lightbox-next" class="absolute right-0 md:right-0 top-0 bottom-0 w-16 md:w-24 flex items-center justify-center text-white text-4xl z-10" aria-label="Next photo"><span class="w-12 h-12 flex items-center justify-center rounded-full" style="background:rgba(20,17,13,0.5)">&#8250;</span></button>
  <figure class="w-full" style="max-width:95vw">
    <img id="lightbox-img" src="" alt="" class="w-full object-contain" style="max-height:92vh">
    <figcaption id="lightbox-caption" class="text-center text-white/80 text-sm mt-3"></figcaption>
  </figure>
</div>

<!-- Video modal -->
<div id="video-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(20,17,13,0.92)">
  <button id="video-modal-close" class="absolute top-5 right-5 text-white text-3xl leading-none" aria-label="Close">&times;</button>
  <div class="w-full" style="max-width:95vw">
    <div id="video-frame-wrap" class="w-full bg-black rounded-lg overflow-hidden" style="aspect-ratio:16/9;max-height:85vh"></div>
    <p id="video-modal-caption" class="text-center text-white/80 text-sm mt-3"></p>
    <a id="video-modal-download" href="#" download class="block text-center text-white/60 text-xs mt-1 underline hover:text-white/90">Download video &#x2193;</a>
  </div>
</div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script src="gallery.js"></script>
</body>
</html>
